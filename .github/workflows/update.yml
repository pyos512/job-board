name: GitHub Pages 배포

# 하이브리드 구조: 수집·암호화·메일은 로컬 PC(publish.py)가 담당.
# 여기서는 PC가 푸시한 암호문(jobs.enc.json)을 받아 Pages 로 배포만 한다.
# (한국 정부사이트가 GitHub 해외 러너 IP를 차단해 클라우드 수집은 불가)
on:
  push:
    branches: [main]
    paths:
      - "data/jobs.enc.json"
      - "index.html"
      - "assets/**"
      - ".well-known/**"
      - "robots.txt"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: 배포할 정적 파일만 구성 (평문·소스·비밀 제외)
        run: |
          mkdir -p _site/data _site/assets _site/.well-known
          cp index.html robots.txt .nojekyll _site/ 2>/dev/null || true
          cp -r assets/* _site/assets/
          cp .well-known/security.txt _site/.well-known/ 2>/dev/null || true
          cp data/jobs.enc.json _site/data/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
