name: 채용보드 매일 갱신·암호화·메일

# 매일: 수집 → '그날의 비밀번호'로 암호화 → jobs.enc.json 커밋(=GitHub Pages 배포) → 링크+비번 메일
on:
  schedule:
    - cron: "0 23 * * *"   # UTC 23:00 = 한국시간(KST) 매일 오전 8시
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: jobs-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install requests beautifulsoup4 cryptography

      - name: 채용공고 수집
        env:
          WORKNET_KEY: ${{ secrets.WORKNET_KEY }}   # (선택) 워크넷 API 키
        run: python scrape.py

      - name: 그날의 비밀번호로 암호화
        id: enc
        run: |
          KEY="$(python build_secure.py | sed -n 's/^DAILY_KEY=//p')"
          echo "::add-mask::$KEY"
          echo "daily_key=$KEY" >> "$GITHUB_OUTPUT"

      - name: 암호문 커밋 (= Pages 배포)
        run: |
          git config user.name  "job-board-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f data/jobs.enc.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore(data): 암호화 채용공고 자동 갱신 $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: 링크 + 오늘의 비밀번호 메일 발송
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SITE_URL: ${{ secrets.SITE_URL }}
          DAILY_KEY: ${{ steps.enc.outputs.daily_key }}
        run: python email_digest.py --link
