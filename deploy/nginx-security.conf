# nginx 로 직접 호스팅할 때 server {} 블록 안에 포함하세요.
# 정적 사이트 — 동적 백엔드 없음(공격면 최소).

# --- 보안 헤더 ---
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "no-referrer" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# 데이터 파일은 캐시 금지(매일 갱신)
location ~* /data/.*\.(json|js)$ {
    add_header Cache-Control "no-store" always;
}

# 숨김/민감 파일 차단
location ~ /\.(?!well-known) { deny all; }
location ~* \.(ps1|bat|md|toml)$ { deny all; }

# 정적 자원 캐시
location ~* \.(css|js|svg|woff2)$ { expires 7d; add_header Cache-Control "public"; }

# HTTP -> HTTPS 강제 (별도 server 블록 예시)
# server { listen 80; server_name example.com; return 301 https://$host$request_uri; }
